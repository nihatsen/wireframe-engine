# ═══════════════════════════════════════════════
#  WIREFRAME RENDER ENGINE - Configuration
# ═══════════════════════════════════════════════
# Live edit: /data/local/tmp/wireframe/config.conf
# Changes apply within ~1 second

# ─── Core Settings ─────────────────────────────
# Master enable (0=off, 1=on)
enabled=1

# Render mode:
#   0 = Off (passthrough)
#   1 = Wireframe only (white edges on black)
#   2 = Wireframe overlay (edges drawn over original)
#   3 = Inverted wireframe (black edges on white)
#   4 = Colored wireframe (edges with original color)
#   5 = X-Ray (transparent + edges)
mode=1

# ─── Edge Detection ───────────────────────────
# Algorithm:
#   0 = Roberts Cross (fastest, 4 texture lookups)
#   1 = Sobel (balanced, 8 texture lookups)
#   2 = Scharr (best quality, 8 texture lookups)
#   3 = Frei-Chen (highest quality, 9 lookups + more math)
shader_quality=1

# Edge sensitivity threshold (0.01 - 1.0)
# Lower = more edges detected, Higher = only strong edges
edge_threshold=0.08

# Edge smoothing (smoothstep range)
edge_smooth_min=0.05
edge_smooth_max=0.20

# ─── Visual Settings ──────────────────────────
# Line color (RGB, 0.0 - 1.0)
line_color_r=1.0
line_color_g=1.0
line_color_b=1.0

# Background color (RGB, 0.0 - 1.0)
bg_color_r=0.0
bg_color_g=0.0
bg_color_b=0.0

# Background opacity for overlay mode (0.0 - 1.0)
bg_opacity=0.0

# Line intensity multiplier (0.5 - 3.0)
line_intensity=1.2

# ─── Performance Settings ─────────────────────
# Processing resolution scale (0.25 - 1.0)
# 0.5 = half resolution (4x faster, slightly softer edges)
# 1.0 = full resolution (best quality)
resolution_scale=1.0

# Use compute shader (0=fragment shader, 1=compute shader)
# Compute shader can be faster on some GPUs but requires GLES 3.1
use_compute=0

# Frame skip (0=process every frame, 1=skip every other, 2=skip 2...)
# Higher = less GPU usage but flickering
frame_skip=0

# Use half-float textures (0=RGBA8, 1=RGBA16F)
# Half-float is faster for edge detection math on some GPUs
use_half_float=0

# Async framebuffer copy using PBO (0=sync, 1=async)
# Async reduces pipeline stalls but adds 1 frame latency
use_pbo=0

# Shader compilation cache (saves compiled shader binary)
cache_shaders=1

# ─── Scope Settings ───────────────────────────
# Apply to all processes (1) or only listed ones (0)
apply_all=1

# Apply to system UI (status bar, nav bar, notifications)
process_systemui=1

# Apply to launcher
process_launcher=1

# Apply to keyboard
process_keyboard=1

# Blacklist (comma-separated package names, no spaces)
# These packages will NOT get wireframe

# Whitelist (only these packages get wireframe if apply_all=0)
whitelist=

# ─── Game Profiles ───────────────────────────────
# Per-app overrides: [profile.<package_name>]
# Only set values you want to override — unset values use globals above.
# Apps with a profile are automatically whitelisted.

# ── Brawl Stars ──────────────────────────────────
# Isometric 3D game with colorful characters and environments.
# Uses mode 6 (game wireframe): multi-channel edge detection that
# catches color boundaries luminance-based detection misses.
# Tuned for fast-paced gameplay with clear character outlines.
[profile.com.supercell.brawlstars]
mode=6
shader_quality=1
edge_threshold=0.06
edge_smooth_min=0.04
edge_smooth_max=0.18
line_color_r=0.0
line_color_g=1.0
line_color_b=0.4
bg_opacity=0.15
line_intensity=1.5
resolution_scale=1.0
frame_skip=0

# ─── Debug ────────────────────────────────────
debug_logging=0
show_fps_overlay=0
dump_shaders=0
